<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fridge Observer Monitor</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0e27;
            color: #e0e6ed;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 30px;
            color: #fff;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .status-indicator {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #4ade80;
            box-shadow: 0 0 20px #4ade80;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .card {
            background: #151b33;
            border-radius: 12px;
            padding: 24px;
            border: 1px solid #1e2847;
        }

        .card h2 {
            font-size: 1.2rem;
            margin-bottom: 20px;
            color: #a5b4fc;
            font-weight: 600;
        }

        .stat-row {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid #1e2847;
        }

        .stat-row:last-child {
            border-bottom: none;
        }

        .stat-label {
            color: #94a3b8;
            font-size: 0.95rem;
        }

        .stat-value {
            font-weight: 600;
            font-size: 1.1rem;
        }

        .door-open {
            color: #fbbf24;
        }

        .door-closed {
            color: #4ade80;
        }

        .processing {
            color: #60a5fa;
        }

        .video-container {
            grid-column: 1 / -1;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #1e2847;
            position: relative;
            aspect-ratio: 16/9;
        }

        .video-container img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .video-overlay {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.7);
            padding: 12px 20px;
            border-radius: 8px;
            font-size: 0.9rem;
            backdrop-filter: blur(10px);
        }

        .log-container {
            grid-column: 1 / -1;
            background: #0a0e1a;
            border-radius: 12px;
            padding: 20px;
            border: 1px solid #1e2847;
            max-height: 300px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 0.85rem;
        }

        .log-line {
            padding: 4px 0;
            color: #94a3b8;
        }

        .log-line.info {
            color: #60a5fa;
        }

        .log-line.warning {
            color: #fbbf24;
        }

        .log-line.error {
            color: #f87171;
        }

        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 6px;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .badge.success {
            background: rgba(74, 222, 128, 0.2);
            color: #4ade80;
        }

        .badge.warning {
            background: rgba(251, 191, 36, 0.2);
            color: #fbbf24;
        }

        .badge.info {
            background: rgba(96, 165, 250, 0.2);
            color: #60a5fa;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: #1e2847;
            border-radius: 4px;
            overflow: hidden;
            margin-top: 8px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #60a5fa, #a5b4fc);
            transition: width 0.3s ease;
        }

        .timestamp {
            color: #64748b;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>
            <span class="status-indicator" id="statusIndicator"></span>
            Fridge Observer Monitor
        </h1>

        <div class="grid">
            <div class="card">
                <h2>Door Status</h2>
                <div class="stat-row">
                    <span class="stat-label">Current State</span>
                    <span class="stat-value" id="doorState">—</span>
                </div>
                <div class="stat-row">
                    <span class="stat-label">Last Event</span>
                    <span class="stat-value timestamp" id="lastEvent">—</span>
                </div>
                <div class="stat-row">
                    <span class="stat-label">Light Level</span>
                    <span class="stat-value" id="lightLevel">—</span>
                </div>
            </div>

            <div class="card">
                <h2>Capture Session</h2>
                <div class="stat-row">
                    <span class="stat-label">Status</span>
                    <span class="stat-value" id="captureStatus">Idle</span>
                </div>
                <div class="stat-row">
                    <span class="stat-label">Frames Captured</span>
                    <span class="stat-value" id="frameCount">0</span>
                </div>
                <div class="stat-row">
                    <span class="stat-label">Duration</span>
                    <span class="stat-value" id="duration">0s</span>
                </div>
                <div class="progress-bar">
                    <div class="progress-fill" id="progressBar" style="width: 0%"></div>
                </div>
            </div>

            <div class="card">
                <h2>Processing</h2>
                <div class="stat-row">
                    <span class="stat-label">AI Model</span>
                    <span class="stat-value" id="aiModel">—</span>
                </div>
                <div class="stat-row">
                    <span class="stat-label">Items Detected</span>
                    <span class="stat-value" id="itemsDetected">0</span>
                </div>
                <div class="stat-row">
                    <span class="stat-label">Last Session</span>
                    <span class="stat-value timestamp" id="lastSession">—</span>
                </div>
            </div>

            <div class="card">
                <h2>System Health</h2>
                <div class="stat-row">
                    <span class="stat-label">Backend</span>
                    <span class="stat-value" id="backendStatus">—</span>
                </div>
                <div class="stat-row">
                    <span class="stat-label">Camera Stream</span>
                    <span class="stat-value" id="cameraStatus">—</span>
                </div>
                <div class="stat-row">
                    <span class="stat-label">Pi Sensor</span>
                    <span class="stat-value" id="sensorStatus">—</span>
                </div>
            </div>
        </div>

        <div class="video-container">
            <img id="videoFeed" src="http://192.168.0.1:8001/stream" alt="Camera Feed">
            <div class="video-overlay">
                <div>📹 Live Feed • <span id="fps">0</span> FPS</div>
            </div>
        </div>

        <div class="log-container" id="logContainer">
            <div class="log-line">Waiting for sensor data...</div>
        </div>
    </div>

    <script>
        let logs = [];
        let frameCount = 0;
        let sessionStart = null;

        function addLog(message, level = 'info') {
            const timestamp = new Date().toLocaleTimeString();
            const logLine = `[${timestamp}] ${message}`;
            logs.unshift(logLine);
            if (logs.length > 50) logs.pop();

            const container = document.getElementById('logContainer');
            container.innerHTML = logs.map(log => 
                `<div class="log-line ${level}">${log}</div>`
            ).join('');
        }

        function updateStatus(data) {
            // Door status
            const doorState = document.getElementById('doorState');
            if (data.door_open) {
                doorState.innerHTML = '<span class="badge warning">OPEN</span>';
            } else {
                doorState.innerHTML = '<span class="badge success">CLOSED</span>';
            }

            // Light level
            document.getElementById('lightLevel').textContent = 
                data.light_level ? `${data.light_level.toFixed(2)} ms` : '—';

            // Capture session
            if (data.capturing) {
                document.getElementById('captureStatus').innerHTML = 
                    '<span class="badge info">Capturing</span>';
                document.getElementById('frameCount').textContent = data.frame_count || 0;
                
                if (sessionStart) {
                    const duration = Math.floor((Date.now() - sessionStart) / 1000);
                    document.getElementById('duration').textContent = `${duration}s`;
                }
            } else if (data.processing) {
                document.getElementById('captureStatus').innerHTML = 
                    '<span class="badge warning">Processing</span>';
            } else {
                document.getElementById('captureStatus').textContent = 'Idle';
                sessionStart = null;
            }

            // AI Model
            document.getElementById('aiModel').textContent = data.ai_model || 'Groq Llama 3.2';

            // Items detected
            if (data.items_detected !== undefined) {
                document.getElementById('itemsDetected').textContent = data.items_detected;
            }

            // Last event
            if (data.last_event) {
                document.getElementById('lastEvent').textContent = 
                    new Date(data.last_event).toLocaleTimeString();
            }
        }

        async function checkHealth() {
            try {
                // Check backend
                const backendRes = await fetch('http://localhost:8000/health');
                document.getElementById('backendStatus').innerHTML = 
                    backendRes.ok ? '<span class="badge success">Online</span>' : 
                    '<span class="badge error">Offline</span>';
            } catch {
                document.getElementById('backendStatus').innerHTML = 
                    '<span class="badge error">Offline</span>';
            }

            try {
                // Check camera
                const cameraRes = await fetch('http://192.168.0.1:8001/health');
                document.getElementById('cameraStatus').innerHTML = 
                    cameraRes.ok ? '<span class="badge success">Online</span>' : 
                    '<span class="badge error">Offline</span>';
            } catch {
                document.getElementById('cameraStatus').innerHTML = 
                    '<span class="badge error">Offline</span>';
            }

            // Sensor status (assume online if we're getting updates)
            document.getElementById('sensorStatus').innerHTML = 
                '<span class="badge success">Monitoring</span>';
        }

        // Poll sensor log for updates
        async function pollSensorLog() {
            try {
                const response = await fetch('http://localhost:8000/api/hardware/sensor-status');
                if (response.ok) {
                    const data = await response.json();
                    updateStatus(data);
                }
            } catch (error) {
                console.error('Failed to fetch sensor status:', error);
            }
        }

        // Initialize
        checkHealth();
        setInterval(checkHealth, 10000);
        setInterval(pollSensorLog, 1000);

        addLog('Monitor initialized', 'info');
        addLog('Connecting to Pi sensor...', 'info');
    </script>
</body>
</html>
