# Fridge Observer — nginx reverse proxy configuration
# Place this file at: /etc/nginx/sites-available/fridge-observer
# Then: sudo ln -s /etc/nginx/sites-available/fridge-observer /etc/nginx/sites-enabled/

upstream fridge_api {
    server 127.0.0.1:8000;
}

upstream fridge_alexa {
    server 127.0.0.1:5000;
}

server {
    listen 80;
    server_name _;  # Matches any hostname / IP

    # Alexa skill endpoint
    location /alexa {
        proxy_pass http://fridge_alexa;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebSocket endpoint — requires upgrade headers
    location /ws {
        proxy_pass http://fridge_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400;  # Keep WebSocket alive for 24h
    }

    # Everything else → FastAPI
    location / {
        proxy_pass http://fridge_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60;
    }
}
